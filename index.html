<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EB-pro | Enterprise Hub</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
    }

    /* Custom scrollbar for enterprise feel */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }
  </style>

</head>

<body>
  <!-- Global Error Handler for Startup Crashes -->
  <script>
    window.onerror = function (msg, url, line, col, error) {
      var root = document.getElementById('root');
      if (root && root.innerHTML === '') {
        document.body.innerHTML = `
            <div style="font-family: sans-serif; padding: 2rem; color: #ef4444; background: #fef2f2; height: 100vh;">
              <h1 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem;">Startup Error</h1>
              <p style="font-weight: semibold;">${msg}</p>
              <p style="font-size: 0.875rem; margin-top: 0.5rem; color: #7f1d1d;">
                Location: ${url}:${line}:${col}
              </p>
              <div style="margin-top: 1rem; padding: 1rem; background: rgba(0,0,0,0.05); border-radius: 0.5rem;">
                <p style="font-size: 0.875rem;"><strong>Diagnosis:</strong> This is likely due to missing Environment Variables on Vercel or a build configuration issue.</p>
                <p style="font-size: 0.875rem; margin-top: 0.5rem;">Please check the browser console for more details.</p>
              </div>
            </div>
          `;
      }
    };
  </script>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
